name: ArchUnit Tests

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  archunit:
    name: Run ArchUnit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*','**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run ArchUnit tests
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --tests "com.app.gerenciadorcartoes.architecture.*" -x kspDebugUnitTestKotlin --no-daemon --info
