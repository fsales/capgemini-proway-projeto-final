name: ArchUnit Tests

on:
  workflow_dispatch: {}

jobs:
  archunit:
    name: Run ArchUnit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*','**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run ArchUnit tests
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x gradlew
          # Create placeholder Google services resources for CI (avoids missing google-services.json errors)
          mkdir -p app/src/debug/res/values
          cat > app/src/debug/res/values/google_services_placeholder.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="default_web_client_id">ci-placeholder</string>
          </resources>
          XML
          ./gradlew :app:testDebugUnitTest --tests "com.app.gerenciadorcartoes.architecture.*" -x kspDebugUnitTestKotlin -x processDebugGoogleServices --no-daemon --info
      - name: Zip ArchUnit report
        run: |
          set -e
          # ensure output exists
          if [ -d "app/build/reports/tests/testDebugUnitTest" ] || [ -d "app/build/test-results/testDebugUnitTest" ]; then
            zip -r archunit-report.zip app/build/reports/tests/testDebugUnitTest app/build/test-results/testDebugUnitTest || true
          else
            echo "No report directories found — creating empty placeholder zip"
            mkdir -p reports/empty
            zip -r archunit-report.zip reports/empty
          fi

      - name: Upload ArchUnit test report
        uses: actions/upload-artifact@v4
        with:
          name: archunit-test-report
          path: archunit-report.zip
          retention-days: 7
